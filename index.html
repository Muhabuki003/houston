<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Flythrough</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #ff5e1a;
      --sky:    #a8d4ff;
      --dim:    #556677;
      --bg:     #0a0e14;
    }

    body {
      background: var(--bg);
      color: #cdd8e8;
      font-family: 'DM Mono', monospace;
      height: 700vh;
    }

    /* Fixed 3-D stage */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Sky gradient that shifts as you scroll */
    #sky-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, #0a0e14 0%, #0a0e14 100%);
      transition: none;
    }

    /* Vignette */
    #stage::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(10,14,20,.7) 100%);
      pointer-events: none;
    }

    /* Progress bar */
    #bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--orange), var(--sky));
      z-index: 20;
      box-shadow: 0 0 12px var(--orange);
    }

    /* Chapter labels */
    .label {
      position: fixed;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s ease;
    }

    #ch1 { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    #ch1 h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      letter-spacing: .08em;
      line-height: .95;
      color: #fff;
    }
    #ch1 h1 span { color: var(--orange); }
    #ch1 p {
      margin-top: 1rem;
      font-size: .6rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--dim);
    }

    #ch2 { bottom: 18%; left: 7%; }
    #ch2 small {
      display: block;
      font-size: .55rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: .4rem;
    }
    #ch2 h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: .06em;
      color: #fff;
      line-height: 1;
    }

    #ch3 { top: 15%; right: 7%; text-align: right; }
    #ch3 h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      color: var(--sky);
      letter-spacing: .06em;
    }
    #ch3 p {
      font-size: .55rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: .3rem;
    }

    #ch4 { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    #ch4 h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 5rem);
      color: #fff;
      letter-spacing: .1em;
    }
    #ch4 p {
      font-size: .6rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--orange);
      margin-top: .5rem;
    }

    /* Scroll hint */
    #hint {
      position: fixed;
      bottom: 2.8rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      transition: opacity .5s;
    }
    #hint span { font-size: .55rem; letter-spacing: .4em; text-transform: uppercase; color: var(--dim); }
    .arrow { animation: bounce 1.6s ease-in-out infinite; }
    .arrow::after {
      content: '';
      display: block;
      width: 8px; height: 8px;
      border-right: 1px solid var(--orange);
      border-bottom: 1px solid var(--orange);
      transform: rotate(45deg);
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(5px); }
    }

    /* HUD coords */
    #hud {
      position: fixed;
      top: 1.2rem;
      left: 1.5rem;
      font-size: .5rem;
      letter-spacing: .2em;
      color: var(--dim);
      opacity: .6;
      z-index: 15;
      line-height: 1.8;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      transition: opacity .8s ease;
    }
    #loading span {
      font-size: .6rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--dim);
    }
    #load-bar-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,.08);
    }
    #load-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange), var(--sky));
      transition: width .1s linear;
      box-shadow: 0 0 8px var(--orange);
    }
  </style>
</head>
<body>

  <div id="sky-bg"></div>
  <div id="stage"><canvas id="c"></canvas></div>
  <div id="bar"></div>

  <!-- Chapter labels -->
  <div class="label" id="ch1">
    <h1>LOW<span>POLY</span><br>CITY</h1>
    <p>Scroll to fly through</p>
  </div>
  <div class="label" id="ch2">
    <small>Street Level</small>
    <h2>Into the<br>grid</h2>
  </div>
  <div class="label" id="ch3">
    <h2>Above the<br>rooftops</h2>
    <p>Aerial perspective</p>
  </div>
  <div class="label" id="ch4">
    <h2>The city awaits</h2>
    <p>Scroll back to the top</p>
  </div>

  <div id="hint">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>

  <div id="hud">
    <div id="hud-pos">POS — — —</div>
    <div id="hud-prog">PROGRESS 0%</div>
  </div>

  <div id="loading">
    <span>Loading city</span>
    <div id="load-bar-wrap"><div id="load-bar"></div></div>
  </div>

  <!-- Three.js r128 (module) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
    }
  }
  </script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script type="module">
    import * as THREE from 'three';

    // GLTFLoader inline (r128 compatible)
    // We inline a minimal loader fetch because CDN path varies
    const { GLTFLoader } = await import(
      'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js'
    );
    const { DRACOLoader } = await import(
      'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/DRACOLoader.js'
    );

    gsap.registerPlugin(ScrollTrigger);

    // ── Renderer ────────────────────────────
    const canvas   = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    renderer.toneMapping       = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.outputEncoding    = THREE.sRGBEncoding;

    // ── Scene ───────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e14);
    scene.fog = new THREE.Fog(0x0a0e14, 60, 180);

    // ── Camera ──────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);
    camera.position.set(0, 30, 80);

    // ── Resize ──────────────────────────────
    function resize() {
      const w = canvas.parentElement.clientWidth;
      const h = canvas.parentElement.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Lights ──────────────────────────────
    scene.add(new THREE.AmbientLight(0x8899bb, 1.8));

    const sun = new THREE.DirectionalLight(0xfff4dd, 3.5);
    sun.position.set(30, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.setScalar(2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far  = 300;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
    sun.shadow.camera.right = sun.shadow.camera.top   =  80;
    scene.add(sun);

    const fillLight = new THREE.DirectionalLight(0x4488cc, .8);
    fillLight.position.set(-20, 10, -20);
    scene.add(fillLight);

    // ── Stars ───────────────────────────────
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(1200 * 3);
    for (let i = 0; i < 1200; i++) {
      const r = 180 + Math.random() * 60;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      starPos[i*3+2] = r * Math.cos(phi);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xaaccff, size: .3, sizeAttenuation: true
    })));

    // ── Load GLB ────────────────────────────
    const loadBar   = document.getElementById('load-bar');
    const loadScreen = document.getElementById('loading');

    const draco = new DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(draco);

    let modelCenter = new THREE.Vector3(0, 0, 0);
    let modelSize   = 50; // fallback, updated after load

    loader.load(
      './lowpoly_city_free.glb',
      (gltf) => {
        const model = gltf.scene;

        // Auto-scale & centre the model
        const box = new THREE.Box3().setFromObject(model);
        const size   = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        // Normalise to ~100 units wide for consistent camera paths
        const maxDim = Math.max(size.x, size.z);
        const scale  = 100 / maxDim;
        model.scale.setScalar(scale);

        // Re-compute after scale
        box.setFromObject(model);
        box.getCenter(center);
        box.getSize(size);

        // Centre horizontally, keep on ground
        model.position.sub(center);
        model.position.y -= box.min.y * scale;

        modelCenter.copy(new THREE.Vector3(0, size.y * .35, 0));
        modelSize = Math.max(size.x, size.z);

        // Enable shadows on every mesh
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow    = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.envMapIntensity = .6;
            }
          }
        });

        scene.add(model);

        // Build camera path AFTER we know the model size
        buildCameraPath(modelSize, size.y);

        // Hide loading screen
        loadScreen.style.opacity = '0';
        setTimeout(() => loadScreen.style.display = 'none', 900);

        // Show intro label
        document.getElementById('ch1').style.opacity = '1';
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          loadBar.style.width = (xhr.loaded / xhr.total * 100) + '%';
        }
      },
      (err) => {
        console.error('GLB load error', err);
        loadScreen.querySelector('span').textContent = 'Error loading model';
      }
    );

    // ── Camera path (built after model loads) ─
    let camPath, lookPath;

    function buildCameraPath(w, h) {
      const r  = w * .65;   // orbit radius
      const rI = w * .18;   // inner / street-level radius
      const hi = h  * 1.1;  // high altitude

      // Cinematic waypoints: wide intro → dive to street → sweep around → roof → outro
      camPath = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0,      hi * .7,  r   ),  // 0%   intro wide
        new THREE.Vector3(r*.6,   hi * .5,  r*.6),  // 10%  drift right
        new THREE.Vector3(rI,     h * .15,  rI  ),  // 25%  descend to street
        new THREE.Vector3(-rI*.5, h * .1,   rI*.2), // 38%  street sweep
        new THREE.Vector3(-rI,    h * .2,   rI  ),  // 50%  low left
        new THREE.Vector3(-r*.5,  hi * .4,  r*.3),  // 62%  rise left
        new THREE.Vector3(-r*.4,  hi * .8,  -r*.3), // 74%  high rear
        new THREE.Vector3(r*.3,   hi * .6,  -r*.4), // 85%  rear right
        new THREE.Vector3(r*.1,   hi * .5,   r*.5), // 94%  return
        new THREE.Vector3(0,      hi * .7,   r   ),  // 100% full loop
      ]);

      // Look-at targets (keep gaze on the city centre, slightly varying height)
      lookPath = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0,    h*.3,  0),
        new THREE.Vector3(0,    h*.2,  0),
        new THREE.Vector3(0,    h*.1,  0),
        new THREE.Vector3(0,    h*.05, 0),
        new THREE.Vector3(0,    h*.1,  0),
        new THREE.Vector3(0,    h*.25, 0),
        new THREE.Vector3(0,    h*.35, 0),
        new THREE.Vector3(0,    h*.3,  0),
        new THREE.Vector3(0,    h*.3,  0),
        new THREE.Vector3(0,    h*.3,  0),
      ]);

      setupScroll();
    }

    // ── ScrollTrigger ────────────────────────
    function setupScroll() {
      const bar   = document.getElementById('bar');
      const hPos  = document.getElementById('hud-pos');
      const hProg = document.getElementById('hud-prog');
      const hint  = document.getElementById('hint');

      const ch1 = document.getElementById('ch1');
      const ch2 = document.getElementById('ch2');
      const ch3 = document.getElementById('ch3');
      const ch4 = document.getElementById('ch4');

      // Sky colour keyframes  [progress, hexColor]
      const skyKeys = [
        [0,    0x0a0e14],
        [0.2,  0x0d1520],
        [0.35, 0x141e10],
        [0.55, 0x0e1a2a],
        [0.75, 0x16100a],
        [1.0,  0x0a0e14],
      ];

      function lerpColor(a, b, t) {
        const ca = new THREE.Color(a), cb = new THREE.Color(b);
        return ca.lerp(cb, t);
      }

      function getSkyColor(p) {
        for (let i = 0; i < skyKeys.length - 1; i++) {
          const [p0, c0] = skyKeys[i];
          const [p1, c1] = skyKeys[i+1];
          if (p >= p0 && p <= p1) {
            const t = (p - p0) / (p1 - p0);
            return lerpColor(c0, c1, t);
          }
        }
        return new THREE.Color(skyKeys[skyKeys.length-1][1]);
      }

      ScrollTrigger.create({
        trigger: document.body,
        start: 'top top',
        end: 'bottom bottom',
        onUpdate(self) {
          const p = self.progress;

          if (!camPath) return;

          // Clamp to avoid edge issues
          const t = Math.min(Math.max(p, 0.001), 0.999);

          // Move camera along spline
          const camPos  = camPath.getPointAt(t);
          const lookPos = lookPath.getPointAt(t);
          camera.position.copy(camPos);
          camera.lookAt(lookPos);

          // Sky tint
          const skyCol = getSkyColor(p);
          scene.background.copy(skyCol);
          scene.fog.color.copy(skyCol);

          // HUD
          bar.style.width = (p * 100) + '%';
          hPos.textContent  = `POS ${camPos.x.toFixed(1)} / ${camPos.y.toFixed(1)} / ${camPos.z.toFixed(1)}`;
          hProg.textContent = `PROGRESS ${Math.round(p * 100)}%`;

          // Scroll hint
          hint.style.opacity = p < .04 ? '1' : '0';

          // Chapter labels using smooth fade windows
          const fade = (lo, peak, hi) =>
            p < lo ? 0 : p < peak ? (p-lo)/(peak-lo) : p < hi ? (hi-p)/(hi-peak) : 0;

          ch1.style.opacity = fade(0, .03, .10).toFixed(2);
          ch2.style.opacity = fade(.20, .27, .46).toFixed(2);
          ch3.style.opacity = fade(.58, .65, .78).toFixed(2);
          ch4.style.opacity = fade(.88, .93, .99).toFixed(2);
        }
      });
    }

    // ── Render loop ──────────────────────────
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += .006;
      // Subtle sun drift
      sun.position.x = 30 + Math.sin(t * .1) * 5;
      fillLight.intensity = .7 + Math.sin(t * .4) * .15;
      ScrollTrigger.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
